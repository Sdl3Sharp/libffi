name: Build release

permissions:
  contents: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to build (optional). If empty, builds the current master."
        required: false
      version:
        description: "Version number for release (optional). If empty, a timestamp will be used."
        required: false
      upstream_commit_sha:
        description: "Upstream commit SHA used as base for the build (optional). If empty, defaults to 'unknown'."
        required: false

  repository_dispatch:
    types: [build-release]

jobs: 
  # ===================================================================
  # 2. Build (Windows)
  # ===================================================================
  build_windows:
    name: Build ${{ matrix.rid }} (Windows)
    runs-on: windows-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # ----------------------------------------------------------
          # Native x64 build
          # ----------------------------------------------------------
          - rid: win-x64
            arch: x64
            build_triple: x86_64-pc-windows-msvc
            msvcc_flags: "-m64"

          # ----------------------------------------------------------
          # Native x86 build
          # ----------------------------------------------------------
          - rid: win-x86
            arch: x86
            build_triple: i686-pc-windows-msvc
            msvcc_flags: ""

          # ----------------------------------------------------------
          # ARM64 build
          # ----------------------------------------------------------
          #- rid: win-arm64
          #  arch: ARM64
          #  build_triple: aarch64-pc-windows-msvc
          #  msvcc_flags: ""

    env:
      BUILD_TYPE: Release
      PACKAGE_DIR: ${{ github.workspace }}\package
      SUCCESS_DIR: ${{ github.workspace }}\success

    steps:
      # --------------------------------------------------------------
      # 1. Checkout source code
      # --------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
            ref: ${{ github.event.inputs.commit_sha || github.event.client_payload.commit_sha || 'master' }}
            fetch-depth: 0

      # --------------------------------------------------------------
      # 2. Setup Visual Studio developer environment + Setup MSYS2 environment
      # --------------------------------------------------------------
      - name: Setup build environments
        uses: cyderize/msvc-msys2@v1
        with:
          use-msvc: true          
          update: true
        env:
          VSCMD_ARG_TGT_ARCH: ${{ matrix.arch }}

      # --------------------------------------------------------------
      # 3. Install Autotools
      # --------------------------------------------------------------
      - name: Install Autotools
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm --needed \
            autoconf \
            automake \
            libtool \
            make \
            m4 \
            git

      # --------------------------------------------------------------
      # 4. Configure & build libffi
      # --------------------------------------------------------------
      - name: Configure and build (libffi)
        shell: msys2 {0}
        run: |
          ./autogen.sh

          echo "=== Configuring for ${{ matrix.build_triple }} ==="

          ./configure \
            --build=${{ matrix.build_triple }} \
            --host=${{ matrix.build_triple }} \
            CC="./msvcc.sh ${{ matrix.msvcc_flags }}" \
            CXX="./msvcc.sh ${{ matrix.msvcc_flags }}" \
            LD=link \
            CPP="cl -nologo -EP" \
            CXXCPP="cl -nologo -EP" \
            CPPFLAGS="-DFFI_BUILDING_DLL" \
            --disable-static --enable-shared --disable-docs

          echo "=== Building ==="

          make -j$(nproc)

      # --------------------------------------------------------------
      # 5. Copy built DLL to package dir and mark success
      # --------------------------------------------------------------
      - name: Copy library and mark success
        run: |
          New-Item -ItemType Directory -Force -Path "$env:PACKAGE_DIR\runtimes\${{ matrix.rid }}\native" | Out-Null
          $dllFile = Get-ChildItem -Path . -Recurse -Filter "*.dll" | Where-Object { $_.FullName -match '\\.libs\\' } | Select-Object -First 1
          if (-not $dllFile) {
            Write-Warning "libffi DLL not found for RID ${{ matrix.rid }}. Skipping."
            exit 0
          }
          Copy-Item $dllFile.FullName "$env:PACKAGE_DIR\runtimes\${{ matrix.rid }}\native\$($dllFile.Name)"
          New-Item -ItemType Directory -Force -Path "$env:SUCCESS_DIR" | Out-Null
          "${{ matrix.rid }}" | Out-File -FilePath "$env:SUCCESS_DIR\${{ matrix.rid }}.txt" -Encoding ascii
        shell: pwsh

      # --------------------------------------------------------------
      # 6. Upload built binary as artifact
      # --------------------------------------------------------------
      - name: Upload artifact (binary)
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: package/runtimes/${{ matrix.rid }}
          if-no-files-found: ignore

      # --------------------------------------------------------------
      # 7. Upload success marker as artifact
      # --------------------------------------------------------------
      - name: Upload artifact (success marker)
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: success-${{ matrix.rid }}
          path: success/${{ matrix.rid }}.txt
          if-no-files-found: ignore

  # ===================================================================
  # 3. Package & Release (Linux + Windows)
  # ===================================================================
  package_and_release:
    name: Package all builds and create release
    runs-on: windows-latest
    needs: [build_windows]
    if: always()
    env:
      ARTIFACTS_DIR: ${{ github.workspace }}\artifacts

    steps:
      # --------------------------------------------------------------
      # 1. Download all artifacts from both build jobs
      # --------------------------------------------------------------
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts_download

      # --------------------------------------------------------------
      # 2. Create combined runtimes folder
      # --------------------------------------------------------------
      # Each artifact folder is named after its RID and contains:
      #   native/<library file>
      # We create runtimes/<rid>/native/ and copy the native folder in.
      # --------------------------------------------------------------
      - name: Create combined runtimes folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "runtimes" | Out-Null
          Get-ChildItem -Path "artifacts_download" -Directory | ForEach-Object {
            $rid = $_.Name
            if (Test-Path "$($_.FullName)\native") {
              New-Item -ItemType Directory -Force -Path "runtimes\$rid" | Out-Null
              Copy-Item -Recurse -Force "$($_.FullName)\native" "runtimes\$rid\"
            }
          }

      # --------------------------------------------------------------
      # 3. Zip the combined runtimes folder
      # --------------------------------------------------------------
      - name: Create combined zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:ARTIFACTS_DIR" | Out-Null
          Compress-Archive -Path "runtimes" -DestinationPath "$env:ARTIFACTS_DIR\runtimes.zip" -Force
      
      # --------------------------------------------------------------
      # 4. Fetch license file and SPDX id via GitHub API
      # --------------------------------------------------------------
      - name: Fetch license metadata via GitHub API
        id: license
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          try {
            $licenseJson = gh api repos/$repo/license | ConvertFrom-Json
          } catch {
            Write-Warning "No license information available for this repo."
            Add-Content -Path $env:GITHUB_OUTPUT -Value "license_file="
            Add-Content -Path $env:GITHUB_OUTPUT -Value "spdx="
            exit 0
          }

          # Ensure artifacts dir exists
          New-Item -ItemType Directory -Force -Path "$env:ARTIFACTS_DIR" | Out-Null

          # Defensive: pick filename
          $licenseFileName = $licenseJson.name
          if (-not $licenseFileName -or [string]::IsNullOrWhiteSpace($licenseFileName)) {
            $licenseFileName = "LICENSE"
            Write-Warning "License JSON did not contain a valid 'name'. Falling back to $licenseFileName"
          }

          # Defensive: check download_url
          if ($licenseJson.download_url -and -not [string]::IsNullOrWhiteSpace($licenseJson.download_url)) {
            Write-Host "Downloading license from $($licenseJson.download_url)"
            try {
              Invoke-WebRequest -Uri $licenseJson.download_url -OutFile "$env:ARTIFACTS_DIR\$licenseFileName"
            } catch {
              Write-Warning "Failed to download license file from $($licenseJson.download_url)"
            }
            if (Test-Path "$env:ARTIFACTS_DIR\$licenseFileName") {
              Write-Host "License file written as $licenseFileName"
              Add-Content -Path $env:GITHUB_OUTPUT -Value "license_file=$licenseFileName"
            } else {
              Write-Warning "LICENSE file was not created!"
              Add-Content -Path $env:GITHUB_OUTPUT -Value "license_file="
            }
          } else {
            Write-Warning "No download_url in license response."
            Add-Content -Path $env:GITHUB_OUTPUT -Value "license_file="
          }

          # Defensive: check SPDX id
          if ($licenseJson.license -and $licenseJson.license.spdx_id -and $licenseJson.license.spdx_id -ne "NOASSERTION") {
            $spdx = $licenseJson.license.spdx_id            
            $spdxClean = $spdx.Trim()
            Write-Host "SPDX id: $spdxClean"
            $spdxClean | Out-File -FilePath "$env:ARTIFACTS_DIR\LICENSE.spdx" -Encoding ascii -NoNewline
            Add-Content -Path $env:GITHUB_OUTPUT -Value "spdx=$spdxClean"
          } else {
            Write-Host "No valid SPDX id found."
            Add-Content -Path $env:GITHUB_OUTPUT -Value "spdx="
          }

      # --------------------------------------------------------------
      # 5. Gather release information
      # --------------------------------------------------------------
      - name: Gather release information
        id: gather
        shell: pwsh
        run: |
          # Version comes from workflow inputs or repository_dispatch payload; fallback to timestamp
          if ([string]::IsNullOrEmpty("${{ github.event.inputs.version || github.event.client_payload.version }}")) {
            $version = (Get-Date -Format "yyyyMMdd-HHmmss")
          } else {
            $version = "${{ github.event.inputs.version || github.event.client_payload.version }}"
          }

          # Based-on line: produce either the URL or 'unknown' (without a trailing commit segment)
          $upstreamCommitSha = "${{ github.event.inputs.upstream_commit_sha || github.event.client_payload.upstream_commit_sha }}"
          if ([string]::IsNullOrEmpty($upstreamCommitSha)) {
            $basedon = "unknown"
          } else {
            $basedon = "https://github.com//libffi/libffi/commit/$upstreamCommitSha"
          }

          # Gather success markers into a comma-separated list
          $successFiles = Get-ChildItem -Path "artifacts_download" -Recurse -Filter "*.txt"
          if ($successFiles.Count -eq 0) {
            $ridlist = "None"
          } else {
            $ridlist = ($successFiles | Get-Content) -join ", "
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "basedon=$basedon"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "ridlist=$ridlist"
          
          if ($ridlist -eq "None") { exit 1 }

      # --------------------------------------------------------------
      # 6. Create or update the GitHub release
      # --------------------------------------------------------------
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gather.outputs.version }}
          name: ${{ steps.gather.outputs.version }}
          body: |
            Based on: ${{ steps.gather.outputs.basedon }}
            Included runtimes: ${{ steps.gather.outputs.ridlist }}
            ${{ steps.license.outputs.spdx && format('License: {0}', steps.license.outputs.spdx) || '' }}
          files: |
            ${{ env.ARTIFACTS_DIR }}/runtimes.zip
            ${{ env.ARTIFACTS_DIR }}/${{ steps.license.outputs.license_file }}
            ${{ env.ARTIFACTS_DIR }}/LICENSE.spdx
